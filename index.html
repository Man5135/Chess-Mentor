<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chess Mentor - Умный тренер по шахматам</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>♟️ AI Chess Mentor</h1>
            <div class="game-settings">
                <select id="color-selector">
                    <option value="white">Белыми</option>
                    <option value="black">Чёрными</option>
                    <option value="random">Случайный цвет</option>
                </select>
                <button id="new-game-btn">Новая игра</button>
                <button id="undo-btn">Отменить ход</button>
            </div>
        </header>

        <main class="game-container">
            <div class="chess-board" id="chess-board"></div>
            
            <div class="game-info">
                <div class="game-status" id="game-status"></div>
                <div class="move-history" id="move-history"></div>
                <div class="position-eval" id="position-eval"></div>
            </div>
        </main>

        <div class="modal-overlay" id="promotion-modal">
            <div class="modal-content">
                <h3>Превращение пешки</h3>
                <p>Выберите фигуру:</p>
                <div class="promotion-options">
                    <button data-piece="queen">♕ Ферзь</button>
                    <button data-piece="rook">♖ Ладья</button>
                    <button data-piece="bishop">♗ Слон</button>
                    <button data-piece="knight">♘ Конь</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="coach-modal">
            <div class="modal-content">
                <h3 id="coach-title">Совет тренера</h3>
                <p id="coach-message"></p>
                <div class="modal-actions">
                    <button class="btn-primary close-modal">Понятно</button>
                    <button class="btn-secondary" id="show-move-btn">Показать ход</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
