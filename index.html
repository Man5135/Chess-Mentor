<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chess Mentor - Тренер по шахматам</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>♟️ AI Chess Mentor</h1>
            <div class="game-controls">
                <button id="new-game-btn">Новая игра</button>
                <button id="hint-btn">Подсказка</button>
                <button id="undo-btn">Отменить ход</button>
            </div>
        </header>

        <main class="game-container">
            <div class="chess-board" id="chess-board"></div>
            
            <div class="game-info">
                <div class="game-status" id="game-status">
                    Ваш ход (белые)
                </div>
                <div class="move-history" id="move-history"></div>
            </div>
        </main>

        <div class="modal-overlay" id="hint-modal">
            <div class="modal-content">
                <h3>Подсказка</h3>
                <p id="hint-text"></p>
                <button class="close-modal">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="js/chess-engine.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
